model_list:
  - model_name: gpt-4o
    litellm_params:
       model: openai/gpt-4o
       api_key: os.environ/OPENAI_API_KEY
       rpm: 2

  - model_name: gpt-4o-mini
    litellm_params:
       model: openai/gpt-4o-mini
       api_key: os.environ/OPENAI_API_KEY

  - model_name: infomaniak-qwen3.5-122b
